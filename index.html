<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>14 Cartas para Ti</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="hearts" id="hearts"></div>
  <div class="ambient ambient-1"></div>
  <div class="ambient ambient-2"></div>
  
  <main class="page">
    <section class="header">
      <p class="eyebrow">14 cartas para ella</p>
      <h1>Hasta llegar a nuestro gran día</h1>
      <p class="subtitle">Una carta por día. La última será la más especial: foto, música y todo lo que siento por ti.</p>
    </section>
    
    <section class="progress-card">
      <div class="progress-info">
        <span id="dayLabel">Día 1 de 14</span>
        <span id="dayMood">Hoy empieza algo bonito</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </section>
    
    <section class="stage">
      <button class="envelope" id="openBtn" aria-label="Abrir carta" type="button">
        <div class="envelope-shadow"></div>
        <div class="envelope-body"></div>
        <div class="envelope-flap"></div>
        <div class="envelope-seal">♥</div>
        
        <article class="letter" id="letter">
          <header class="letter-head">
            <div class="letter-head-text">
              <p class="letter-kicker" id="letterKicker">Carta de hoy</p>
              <h2 id="letterTitle">Para ti</h2>
            </div>
            <span class="badge" id="dayBadge">01</span>
          </header>
          <div class="letter-layout">
            <div class="letter-photo-wrap" id="photoSlideshow">
              </div>
            <div class="letter-text-wrap">
              <div class="letter-body" id="letterBody"></div>
              <div class="letter-sign" id="letterSign">
                Con todo mi amor,<br><strong>Diego</strong>
              </div>
            </div>
          </div>
        </article>
      </button>
    </section>

    
  </main>

  <script src="script.js"></script>
</body>
</html>
